<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>博驰公司AI助理采购与使用计划</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        safelist: [
          { pattern: /bg-(slate|indigo|blue|purple|emerald|rose|green)-(50|100|200|300|400|500|600|700|800|900)/ },
          { pattern: /text-(slate|indigo|blue|purple|emerald|rose|green)-(50|100|200|300|400|500|600|700|800|900)/ },
          { pattern: /border-(slate|indigo|blue|purple|emerald|rose|green)-(50|100|200|300|400|500|600|700|800|900)/ },
          { pattern: /accent-(slate|indigo|blue|purple|emerald|rose|green)-(500|600)/ }
        ]
      }
    </script>

    <!-- 【核心修改：替换为国内极速 CDN 镜像，解决国内白屏打不开的问题】 -->
    <script src="https://cdn.staticfile.net/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.staticfile.net/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.staticfile.net/babel-standalone/7.23.10/babel.min.js"></script>

    <style>
      /* 隐藏移动端多余滚动条，优化触控体验 */
      body { -webkit-tap-highlight-color: transparent; }
      input[type=range] { pointer-events: auto; }
    </style>
</head>
<body class="bg-slate-50">
    
    <!-- 【新增：防白屏加载提示】 -->
    <div id="root">
        <div style="text-align: center; margin-top: 20vh; color: #64748b; font-family: sans-serif;">
            <h2 style="color: #0f172a; font-size: 24px; margin-bottom: 12px;">正在加载看板引擎...</h2>
            <p>正在拉取渲染组件，请稍候。<br>如果长时间停留在此页面，请检查您的网络连接。</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 图标组件 ---
        const IconProps = { xmlns: "http://www.w3.org/2000/svg", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" };
        const ServerIcon = ({ className }) => <svg {...IconProps} className={className}><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>;
        const CpuIcon = ({ className }) => <svg {...IconProps} className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>;
        const ShieldCheckIcon = ({ className }) => <svg {...IconProps} className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>;
        const MessageSquareIcon = ({ className }) => <svg {...IconProps} className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
        const LockIcon = ({ className }) => <svg {...IconProps} className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const PieChartIcon = ({ className }) => <svg {...IconProps} className={className}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>;
        const CheckCircle2Icon = ({ className }) => <svg {...IconProps} className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
        const AlertTriangleIcon = ({ className }) => <svg {...IconProps} className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
        const HardDriveIcon = ({ className }) => <svg {...IconProps} className={className}><line x1="22" y1="12" x2="2" y2="12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><line x1="6" y1="16" x2="6.01" y2="16"/><line x1="10" y1="16" x2="10.01" y2="16"/></svg>;
        const NetworkIcon = ({ className }) => <svg {...IconProps} className={className}><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></svg>;
        const SlidersIcon = ({ className }) => <svg {...IconProps} className={className}><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>;
        const SettingsIcon = ({ className }) => <svg {...IconProps} className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
        const TrendingUpIcon = ({ className }) => <svg {...IconProps} className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const ClockIcon = ({ className }) => <svg {...IconProps} className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const DatabaseIcon = ({ className }) => <svg {...IconProps} className={className}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;
        const CloudIcon = ({ className }) => <svg {...IconProps} className={className}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>;

        // --- 礼花组件 ---
        const Confetti = () => {
          const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#32c5ff', '#50e3c2'];
          return (
            <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
              {Array.from({ length: 60 }).map((_, i) => {
                const style = {
                  left: `${Math.random() * 100}%`,
                  animationDelay: `${Math.random() * 2}s`,
                  backgroundColor: colors[i % colors.length],
                  width: `${Math.random() * 8 + 6}px`,
                  height: `${Math.random() * 16 + 8}px`,
                  animationDuration: `${Math.random() * 2 + 2}s`,
                  transform: `rotate(${Math.random() * 360}deg)`
                };
                return <div key={i} className="absolute top-[-10%] confetti-piece" style={style} />;
              })}
              <style>{`
                @keyframes fall {
                  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
                  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
                }
                .confetti-piece { animation: fall linear forwards; border-radius: 2px; }
              `}</style>
            </div>
          );
        };

        // --- 主应用组件 ---
        function BossPresentationApp() {
          const [hardwareSelect, setHardwareSelect] = useState('studio-max');
          const [customHardwarePrice, setCustomHardwarePrice] = useState(25000); 
          const [showConfetti, setShowConfetti] = useState(false); 
          const [deploymentMode, setDeploymentMode] = useState('api');

          const MAX_SLIDER_BUDGET = 30000;
          const [activeCategory, setActiveCategory] = useState('overseas');
          const [apiBudgets, setApiBudgets] = useState({ domestic: 2000, overseas: 8000, long: 2000 });

          const [localModelTier, setLocalModelTier] = useState('72B');
          const [localDeployBudget, setLocalDeployBudget] = useState(32999);
          const MAX_LOCAL_DEPLOY_BUDGET = 100000;

          const totalCurrentApiBudget = Object.values(apiBudgets).reduce((a, b) => a + b, 0);
          const effectiveApiBudget = deploymentMode === 'local' ? 0 : totalCurrentApiBudget;

          const LOCAL_MODELS = {
            '7B': { title: '轻量级 (8B-14B)', models: 'Qwen2.5-7B, GLM-4-9B', ram: '≥ 16GB', basePrice: 5999, hardware: 'Mac mini M4 (标准)', desc: '日常对话、文档总结。', color: 'slate' },
            '32B': { title: '中量级 (32B)', models: 'Qwen2.5-32B, DeepSeek-Coder', ram: '≥ 48GB', basePrice: 14999, hardware: 'Mac mini M4 Pro', desc: '极高代码与逻辑推理。', color: 'indigo' },
            '72B': { title: '重量级 (70B+)', models: 'Qwen2.5-72B, Llama-3-70B', ram: '≥ 128GB', basePrice: 32999, hardware: 'Mac Studio (Ultra)', desc: '开源界天花板，绝密分析。', color: 'purple' }
          };

          const handleLocalTierSelect = (key) => {
            setLocalModelTier(key);
            setLocalDeployBudget(LOCAL_MODELS[key].basePrice);
          };

          const applyLocalBudgetToHardware = () => {
            setHardwareSelect('custom');
            setCustomHardwarePrice(localDeployBudget);
            const el = document.getElementById('hardware-section');
            if (el) el.scrollIntoView({ behavior: 'smooth' });
          };

          const hardwareOptions = {
            'mini-basic': { title: 'Mac mini M4', subtitle: '基础', price: 5999, ram: '24GB', desc: '跑基础小模型。', local: '极弱', color: 'slate', icon: <HardDriveIcon className="w-6 h-6 sm:w-8 sm:h-8 text-slate-600" /> },
            'mini-pro': { title: 'Mac mini M4 Pro', subtitle: '甜点', price: 14999, ram: '48GB/64GB', desc: '跑32B级别模型。', local: '中等', color: 'indigo', icon: <HardDriveIcon className="w-6 h-6 sm:w-8 sm:h-8 text-indigo-600" /> },
            'studio-max': { title: 'Mac Studio (Max)', subtitle: '推荐', price: 16499, ram: '64GB', desc: '流畅跑部分70B模型。', local: '强', color: 'blue', icon: <ServerIcon className="w-6 h-6 sm:w-8 sm:h-8 text-blue-600" /> },
            'studio-ultra': { title: 'Mac Studio (Ultra)', subtitle: '算力', price: 32999, ram: '128GB+', desc: '跑超大模型无压力。', local: '极强', color: 'purple', icon: <ServerIcon className="w-6 h-6 sm:w-8 sm:h-8 text-purple-600" /> },
            'custom': { title: '自定义设备', subtitle: '灵活', price: customHardwarePrice, ram: '云主机等', desc: '根据实际测算填入。', local: '未知', color: 'emerald', icon: <SettingsIcon className="w-6 h-6 sm:w-8 sm:h-8 text-emerald-600" />, isCustom: true }
          };

          const handleBudgetChange = (key, value) => {
            if (value === '') { setApiBudgets({ ...apiBudgets, [key]: 0 }); return; }
            const newValue = parseInt(value, 10);
            if (!isNaN(newValue)) { setApiBudgets({ ...apiBudgets, [key]: newValue }); }
          };

          const handleCustomHardwarePriceChange = (e) => {
            const value = e.target.value;
            setCustomHardwarePrice(value === '' ? 0 : parseInt(value, 10) || 0);
          };

          const handleLocalDeployBudgetChange = (e) => {
            const value = e.target.value;
            setLocalDeployBudget(value === '' ? 0 : parseInt(value, 10) || 0);
          };

          const triggerConfetti = () => {
            setShowConfetti(true);
            setTimeout(() => { setShowConfetti(false); }, 4500); 
          };

          const MODEL_INFO = {
            domestic: { id: 'domestic', title: '国产头部大模型', role: '跑腿小秘', models: 'DeepSeek / 通义', priceInput: 1.0, priceOutput: 2.0, desc: '日常处理、写邮件、安排日程。', color: 'emerald' },
            overseas: { id: 'overseas', title: '海外顶级大模型', role: '智囊团专家', models: 'Claude 3.5 / GPT-4o', priceInput: 21.0, priceOutput: 105.0, desc: '深度分析、高阶逻辑、外文商务。', color: 'indigo' },
            long: { id: 'long', title: '长文本专用模型', role: '档案阅读员', models: 'Kimi / Qwen-Long', priceInput: 5.0, priceOutput: 15.0, desc: '超长财报、研报总结。一目十行。', color: 'purple' }
          };

          const calculateVolume = (budget, priceInput, priceOutput) => {
            const actualPower = budget / 1.3; 
            const outputTokens = actualPower / (4 * priceInput + priceOutput) || 0;
            const inputTokens = outputTokens * 4;
            const totalTokens = inputTokens + outputTokens;
            const wordsInMillions = totalTokens * 1.5; 
            return {
              buffer: (budget - actualPower).toFixed(0),
              actualPower: actualPower.toFixed(0),
              inputTokens: inputTokens.toFixed(1),
              outputTokens: outputTokens.toFixed(1),
              totalTokens: totalTokens.toFixed(1),
              words: wordsInMillions.toFixed(1)
            };
          };

          return (
            <div className="font-sans text-slate-800 pb-16">
              {showConfetti && <Confetti />}
              <div className="max-w-6xl mx-auto space-y-5 sm:space-y-8 p-3 sm:p-6 md:p-8 mt-2 sm:mt-6">
                
                {/* 头部区域 */}
                <header className="bg-white rounded-xl sm:rounded-2xl shadow-sm p-5 sm:p-8 border border-slate-100 relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-32 h-32 sm:w-64 sm:h-64 bg-blue-50 rounded-full blur-2xl sm:blur-3xl -mr-10 -mt-10 sm:-mr-20 sm:-mt-20"></div>
                  <div className="relative z-10">
                    <h1 className="text-2xl sm:text-3xl md:text-4xl font-bold text-slate-900 mb-3 sm:mb-4">博驰公司AI助理规划</h1>
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 sm:p-6 rounded-r-lg shadow-inner">
                      <p className="text-sm sm:text-base md:text-lg text-blue-900 leading-relaxed font-medium">
                        “老板您好，关于给咱们公司配备 AI 助理，我做了一个详细规划：<br/>
                        <span className="text-blue-700 font-bold">买一台安全的服务器当‘数字办公室’，结合架构路线决定是否拨付 API 预算请云端大脑，另外我们也核算了完全本地私有化的回报周期，为大家安排绝对保密的‘单间’。</span>”
                      </p>
                    </div>
                  </div>
                </header>

                {/* 模块一 */}
                <section id="hardware-section" className="bg-white rounded-xl sm:rounded-2xl shadow-sm p-5 sm:p-8 border border-slate-100 scroll-mt-6">
                  <div className="flex items-center mb-4 sm:mb-6">
                    <CpuIcon className="w-5 h-5 sm:w-6 sm:h-6 text-blue-600 mr-2 sm:mr-3" />
                    <h2 className="text-xl sm:text-2xl font-bold text-slate-900">第一块：硬件设备选型</h2>
                  </div>
                  <p className="text-sm sm:text-base text-slate-600 mb-4 sm:mb-6">为了绝对的数据安全，坚决不能上公有云。我汇总了目前最适合做本地节点的配置：</p>
                  
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3 sm:gap-4">
                    {Object.entries(hardwareOptions).map(([key, option]) => (
                      <div key={key} onClick={() => setHardwareSelect(key)}
                        className={`relative cursor-pointer transition-all duration-300 rounded-xl p-4 sm:p-5 border-2 flex flex-row sm:flex-col items-center sm:items-stretch ${
                          hardwareSelect === key ? `border-${option.color}-500 bg-${option.color}-50/30 shadow-md sm:-translate-y-1` : `border-slate-200 hover:border-${option.color}-300 hover:bg-slate-50`
                        }`}
                      >
                        {hardwareSelect === key && ( <div className="absolute top-2 right-2 sm:top-3 sm:right-3"><CheckCircle2Icon className={`w-4 h-4 sm:w-5 sm:h-5 text-${option.color}-500`} /></div> )}
                        
                        <div className="mr-4 sm:mr-0 sm:mb-3 flex items-center justify-center pt-1 sm:pt-2">
                          <div className={`p-2 sm:p-3 bg-white rounded-full shadow-sm border border-${option.color}-100`}>{option.icon}</div>
                        </div>
                        
                        <div className="flex-grow sm:text-center flex flex-col justify-center w-full">
                          <div className="flex justify-between sm:block sm:mb-4">
                            <div>
                                <h3 className="text-base sm:text-lg font-bold text-slate-900 leading-tight mb-1">{option.title}</h3>
                                <p className={`text-[10px] sm:text-xs font-bold text-${option.color}-600 bg-${option.color}-100 inline-block px-1.5 sm:px-2 py-0.5 rounded`}>{option.subtitle}</p>
                            </div>
                            
                            {/* 移动端价格显示在右侧 */}
                            <div className="sm:hidden text-right flex flex-col justify-center">
                                {option.isCustom && hardwareSelect === key ? (
                                    <input type="number" value={customHardwarePrice || ''} onChange={handleCustomHardwarePriceChange} onClick={(e) => e.stopPropagation()} className="w-20 bg-white border border-emerald-300 rounded px-1 py-1 text-slate-800 text-sm font-bold focus:outline-none" placeholder="预算" />
                                ) : (
                                    <span className="font-bold text-slate-800 text-sm">¥{option.price.toLocaleString()}</span>
                                )}
                            </div>
                          </div>

                          <div className="hidden sm:flex flex-col border-b border-slate-100 pb-2 mt-auto">
                            <span className="text-xs text-slate-500 mb-1">设备预算</span>
                            {option.isCustom && hardwareSelect === key ? (
                              <div className="flex items-center justify-center">
                                <span className="text-slate-800 font-bold mr-1">¥</span>
                                <input type="number" value={customHardwarePrice || ''} onChange={handleCustomHardwarePriceChange} onClick={(e) => e.stopPropagation()} className="w-full bg-white border border-emerald-300 rounded px-2 py-1 text-slate-800 font-bold focus:outline-none" placeholder="输入预算" />
                              </div>
                            ) : (
                              <span className="font-bold text-slate-800">¥{option.price.toLocaleString()}</span>
                            )}
                          </div>
                          
                          <div className="hidden sm:block mt-2">
                            <span className="text-xs text-slate-500 block mb-0.5">硬件参数</span>
                            <span className="text-sm font-medium text-slate-800 block">{option.ram}</span>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </section>

                {/* 路线切换器 */}
                <div className="bg-slate-900 rounded-xl sm:rounded-2xl shadow-lg p-1 sm:p-2 flex flex-col md:flex-row items-center justify-between border border-slate-800 relative z-20">
                  <div className="px-4 py-3 md:px-6 md:py-2 text-center md:text-left">
                    <h2 className="text-base sm:text-lg font-bold text-white flex justify-center md:justify-start items-center"><NetworkIcon className="w-4 h-4 sm:w-5 sm:h-5 mr-2 text-blue-400" />架构路线模式选择</h2>
                  </div>
                  <div className="flex flex-col sm:flex-row bg-slate-800 p-1.5 rounded-lg sm:rounded-xl m-2 w-[95%] sm:w-auto gap-2 sm:gap-0">
                    <button onClick={() => setDeploymentMode('api')} className={`flex-1 px-4 sm:px-6 py-2 sm:py-3 rounded-md sm:rounded-lg text-sm sm:text-base font-bold transition-all flex items-center justify-center ${deploymentMode === 'api' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-slate-700'}`}>
                      <CloudIcon className="w-4 h-4 mr-2" /> 云端 API
                    </button>
                    <button onClick={() => setDeploymentMode('local')} className={`flex-1 px-4 sm:px-6 py-2 sm:py-3 rounded-md sm:rounded-lg text-sm sm:text-base font-bold transition-all flex items-center justify-center ${deploymentMode === 'local' ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-slate-700'}`}>
                      <DatabaseIcon className="w-4 h-4 mr-2" /> 本地私有化
                    </button>
                  </div>
                </div>

                {/* 模块二 */}
                <section className={`bg-white rounded-xl sm:rounded-2xl shadow-sm p-5 sm:p-8 border border-slate-100 transition-all duration-500 relative ${deploymentMode === 'local' ? 'opacity-50 grayscale pointer-events-none' : ''}`}>
                  {deploymentMode === 'local' && (
                    <div className="absolute inset-0 z-10 flex items-center justify-center bg-white/40 rounded-xl sm:rounded-2xl backdrop-blur-[2px]">
                      <div className="bg-slate-900 text-white px-4 sm:px-6 py-2 sm:py-3 rounded-full font-bold shadow-xl border border-slate-700 flex items-center transform -rotate-2 scale-100 sm:scale-110 text-xs sm:text-base text-center">
                        <CheckCircle2Icon className="w-4 h-4 sm:w-5 sm:h-5 mr-1 sm:mr-2 text-emerald-400 flex-shrink-0" />
                        已启用本地部署，API消费划去
                      </div>
                    </div>
                  )}

                  <div className="flex flex-col lg:flex-row lg:items-center justify-between mb-4 sm:mb-6">
                    <div className="flex items-center mb-3 lg:mb-0">
                      <PieChartIcon className="w-5 h-5 sm:w-6 sm:h-6 text-indigo-600 mr-2 sm:mr-3" />
                      <h2 className="text-xl sm:text-2xl font-bold text-slate-900">第二块：云端 API 预算</h2>
                    </div>
                    <div className="bg-indigo-50 px-4 sm:px-5 py-2 sm:py-3 rounded-lg sm:rounded-xl border border-indigo-100 font-bold shadow-sm flex items-center justify-between lg:justify-start">
                      <span className="text-slate-600 text-xs sm:text-sm font-normal mr-2">API 动态总预算:</span> 
                      <span className={`text-lg sm:text-xl ${deploymentMode === 'local' ? 'text-slate-400 line-through decoration-rose-500 decoration-2' : 'text-indigo-700'}`}>
                        ¥{totalCurrentApiBudget.toLocaleString()}
                      </span> 
                    </div>
                  </div>

                  <div className="grid lg:grid-cols-3 gap-4 sm:gap-6">
                    <div className="lg:col-span-1 flex flex-row lg:flex-col gap-2 sm:gap-4 overflow-x-auto pb-2 lg:pb-0 snap-x">
                      {Object.entries(MODEL_INFO).map(([key, info]) => {
                        const isActive = activeCategory === key;
                        return (
                          <div key={key} onClick={() => setActiveCategory(key)}
                            className={`min-w-[140px] sm:min-w-[180px] lg:w-full cursor-pointer rounded-xl p-3 sm:p-4 border-2 transition-all duration-200 snap-center ${isActive ? `border-${info.color}-500 bg-${info.color}-50 shadow-md` : `border-slate-200 hover:border-${info.color}-300 hover:bg-slate-50`}`}
                          >
                            <div className="flex justify-between items-start mb-1">
                              <h3 className={`font-bold text-sm sm:text-base text-${info.color}-800`}>{info.title}</h3>
                              {isActive && <CheckCircle2Icon className={`hidden sm:block w-4 h-4 sm:w-5 sm:h-5 text-${info.color}-500`} />}
                            </div>
                            <p className={`text-[10px] sm:text-xs text-${info.color}-600 font-medium mb-2 sm:mb-3`}>({info.role})</p>
                            <div className="flex flex-col sm:flex-row justify-between sm:items-center text-xs sm:text-sm font-medium">
                              <span className="text-slate-500 hidden sm:inline">已分配</span>
                              <span className="text-slate-800 text-sm sm:text-lg font-bold">¥{apiBudgets[key].toLocaleString()}</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    <div className="lg:col-span-2 bg-slate-50 rounded-xl p-4 sm:p-6 border border-slate-200 shadow-inner flex flex-col">
                      {activeCategory && (() => {
                        const info = MODEL_INFO[activeCategory];
                        const budget = apiBudgets[activeCategory];
                        const volumeInfo = calculateVolume(budget, info.priceInput, info.priceOutput);
                        
                        return (
                          <>
                            <div className="mb-4 sm:mb-6">
                              <h3 className={`text-xl sm:text-2xl font-bold text-${info.color}-800 mb-2 sm:mb-3`}>{info.title}</h3>
                              <div className={`bg-${info.color}-50 border border-${info.color}-200 rounded-lg p-2 sm:p-3 flex flex-row gap-2 sm:gap-4 mb-3 sm:mb-4`}>
                                <div className="flex-1">
                                  <span className="text-[10px] sm:text-xs text-slate-500 block mb-1">📥 输入成本</span>
                                  <span className={`font-bold text-sm sm:text-base text-${info.color}-800`}>¥{info.priceInput.toFixed(2)}</span><span className="text-[10px] sm:text-xs text-slate-500 hidden sm:inline"> / 百万Token</span>
                                </div>
                                <div className={`w-px bg-${info.color}-200`}></div>
                                <div className="flex-1">
                                  <span className="text-[10px] sm:text-xs text-slate-500 block mb-1">📤 输出成本</span>
                                  <span className={`font-bold text-sm sm:text-base text-${info.color}-800`}>¥{info.priceOutput.toFixed(2)}</span><span className="text-[10px] sm:text-xs text-slate-500 hidden sm:inline"> / 百万Token</span>
                                </div>
                              </div>
                            </div>

                            <div className="mb-6 sm:mb-8 bg-white p-4 sm:p-5 rounded-xl border border-slate-200 shadow-sm">
                              <div className="flex flex-col sm:flex-row justify-between sm:items-center mb-4 sm:mb-5 gap-2 sm:gap-3">
                                <label className="font-bold text-sm sm:text-base text-slate-700 flex items-center"><SlidersIcon className="w-4 h-4 sm:w-5 sm:h-5 mr-1 sm:mr-2 text-slate-500" /> 分配额度 (¥)</label>
                                <div className="flex items-center bg-slate-50 border border-slate-300 rounded-lg overflow-hidden focus-within:border-indigo-500 focus-within:ring-1">
                                  <span className="px-2 sm:px-3 text-slate-500 font-bold bg-slate-100 border-r border-slate-300">¥</span>
                                  <input type="number" min="0" value={budget || ''} onChange={(e) => handleBudgetChange(activeCategory, e.target.value)} className={`w-24 sm:w-32 px-2 sm:px-3 py-1 sm:py-2 text-base sm:text-lg font-bold text-${info.color}-700 focus:outline-none bg-transparent`} />
                                </div>
                              </div>
                              <input type="range" min="0" max={MAX_SLIDER_BUDGET} step="100" value={budget} onChange={(e) => handleBudgetChange(activeCategory, e.target.value)} className={`w-full h-2 sm:h-3 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-${info.color}-600`} />
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 mt-auto">
                              <div className="bg-white p-3 sm:p-4 rounded-xl border border-slate-200 flex flex-col justify-between">
                                <p className="text-[10px] sm:text-xs text-slate-500 mb-2 font-medium">冗余折算</p>
                                <div className="space-y-1 mb-2">
                                  <div className="flex justify-between text-xs sm:text-sm"><span className="text-slate-600">分配金额:</span><span className="font-bold">¥{budget}</span></div>
                                  <div className="flex justify-between text-xs sm:text-sm text-rose-500 bg-rose-50 px-1 py-0.5 rounded"><span>- 锁定冗余:</span><span>¥{volumeInfo.buffer}</span></div>
                                </div>
                                <div className="pt-2 border-t border-slate-100 flex justify-between text-xs sm:text-sm items-center">
                                  <span className="text-slate-800 font-bold">可用算力金:</span><span className="text-emerald-600 font-bold text-base sm:text-lg">¥{volumeInfo.actualPower}</span>
                                </div>
                              </div>

                              <div className={`bg-${info.color}-600 p-3 sm:p-5 rounded-xl shadow-md text-white flex flex-col justify-center relative overflow-hidden`}>
                                <div className="absolute -right-6 -bottom-6 opacity-10"><PieChartIcon className="w-24 h-24 sm:w-32 sm:h-32" /></div>
                                <p className={`text-${info.color}-100 text-xs sm:text-sm mb-2 sm:mb-3 relative z-10 font-medium`}>预计支持业务工作量</p>
                                <div className="space-y-1 sm:space-y-2 relative z-10 mb-2 sm:mb-3">
                                  <div className="flex justify-between items-center bg-white/10 rounded px-1.5 sm:px-2 py-0.5 sm:py-1"><span className={`text-${info.color}-100 text-[10px] sm:text-sm truncate mr-1 sm:mr-2`}>📥 传入</span><span className="font-bold whitespace-nowrap text-xs sm:text-base">{volumeInfo.inputTokens} <span className="text-[8px] sm:text-xs font-normal opacity-80">M</span></span></div>
                                  <div className="flex justify-between items-center bg-white/10 rounded px-1.5 sm:px-2 py-0.5 sm:py-1"><span className={`text-${info.color}-100 text-[10px] sm:text-sm truncate mr-1 sm:mr-2`}>📤 产出</span><span className="font-bold whitespace-nowrap text-xs sm:text-base">{volumeInfo.outputTokens} <span className="text-[8px] sm:text-xs font-normal opacity-80">M</span></span></div>
                                </div>
                                <p className={`text-${info.color}-200 text-[10px] sm:text-xs mt-auto relative z-10 truncate border-t border-white/20 pt-1 sm:pt-2`}>折合中文约 <strong className="text-white text-xs sm:text-sm">{volumeInfo.words}</strong> 百万字</p>
                              </div>
                            </div>
                          </>
                        );
                      })()}
                    </div>
                  </div>
                </section>

                {/* 模块三 */}
                <section className="bg-slate-900 rounded-xl sm:rounded-2xl shadow-lg p-5 sm:p-8 border border-slate-800 text-white relative overflow-hidden">
                  <div className="absolute -top-20 -left-20 sm:-top-40 sm:-left-40 w-64 h-64 sm:w-96 sm:h-96 bg-emerald-500 rounded-full blur-2xl sm:blur-3xl opacity-10 pointer-events-none"></div>
                  <div className="flex items-center mb-4 sm:mb-6 relative z-10">
                    <TrendingUpIcon className="w-6 h-6 sm:w-7 sm:h-7 text-emerald-400 mr-2 sm:mr-3 flex-shrink-0" />
                    <h2 className="text-xl sm:text-2xl font-bold leading-tight">第三块：本地部署 ROI 核算</h2>
                  </div>
                  <p className="text-sm sm:text-base text-slate-300 mb-6 sm:mb-8 relative z-10">买断高端算力硬件看似昂贵，但与连年续费的“云端 API 总预算”相比，<strong className="text-emerald-400">几年能回本？</strong></p>

                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 sm:gap-8 relative z-10">
                    <div className="lg:col-span-5 flex flex-row lg:flex-col gap-3 overflow-x-auto pb-2 lg:pb-0 snap-x">
                      {Object.entries(LOCAL_MODELS).map(([key, info]) => {
                        const isActive = localModelTier === key;
                        return (
                          <div key={key} onClick={() => handleLocalTierSelect(key)}
                            className={`min-w-[200px] lg:w-full cursor-pointer rounded-xl p-3 sm:p-4 border transition-all duration-200 flex flex-col snap-center ${isActive ? `border-emerald-400 bg-slate-800 shadow-[0_0_15px_rgba(52,211,153,0.15)]` : `border-slate-700 hover:border-slate-500 hover:bg-slate-800/50`}`}
                          >
                            <div className="flex justify-between items-start mb-1 sm:mb-2"><h3 className={`text-sm sm:text-base font-bold ${isActive ? 'text-emerald-400' : 'text-slate-200'}`}>{info.title}</h3>{isActive && <CheckCircle2Icon className="hidden sm:block w-4 h-4 sm:w-5 sm:h-5 text-emerald-400" />}</div>
                            <p className="text-[10px] sm:text-sm text-slate-400 mb-2 truncate">{info.models}</p>
                            <div className="flex flex-col sm:flex-row gap-1 sm:gap-2 mb-1 mt-auto">
                              <span className="text-[10px] sm:text-xs bg-slate-700 text-slate-300 px-1.5 sm:px-2 py-0.5 sm:py-1 rounded flex items-center w-max"><DatabaseIcon className="w-2.5 h-2.5 sm:w-3 sm:h-3 mr-1" /> {info.ram}</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    <div className="lg:col-span-7 flex flex-col">
                      <div className="bg-slate-800 rounded-xl p-4 sm:p-6 border border-slate-700 mb-4 sm:mb-6 flex-grow flex flex-col justify-center">
                        <div className="flex flex-col sm:flex-row justify-between sm:items-center mb-4 sm:mb-6 gap-3 sm:gap-4">
                          <div>
                            <label className="font-bold text-sm sm:text-base text-slate-200 flex items-center mb-1"><SlidersIcon className="w-4 h-4 sm:w-5 sm:h-5 mr-1 sm:mr-2 text-emerald-500" /> 硬件总投资 (¥)</label>
                          </div>
                          <div className="flex items-center bg-slate-900 border border-slate-600 rounded-lg overflow-hidden focus-within:border-emerald-500">
                            <span className="px-2 sm:px-3 text-emerald-500 font-bold bg-slate-800 border-r border-slate-600">¥</span>
                            <input type="number" min="0" value={localDeployBudget || ''} onChange={handleLocalDeployBudgetChange} className="w-24 sm:w-32 px-2 sm:px-3 py-1 sm:py-2 text-lg sm:text-xl font-bold text-white focus:outline-none bg-transparent" />
                          </div>
                        </div>
                        <input type="range" min="5000" max={MAX_LOCAL_DEPLOY_BUDGET} step="1000" value={localDeployBudget} onChange={handleLocalDeployBudgetChange} className="w-full h-2 sm:h-3 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500 mb-3 sm:mb-4" />
                        <button onClick={applyLocalBudgetToHardware} className="text-xs sm:text-sm text-emerald-400 hover:text-emerald-300 font-medium sm:self-end transition-colors flex items-center justify-center bg-slate-900/50 sm:bg-transparent py-2 sm:py-0 rounded"><CpuIcon className="w-3 h-3 sm:w-4 sm:h-4 mr-1" />应用为“自定义设备”造价</button>
                      </div>

                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                        <div className="bg-slate-800 p-4 sm:p-5 rounded-xl border border-slate-700 flex flex-col justify-center">
                          <p className="text-xs sm:text-sm text-slate-400 mb-1">对比项：云端 API 预算</p>
                          <p className="text-xl sm:text-2xl font-bold text-slate-200 mb-2">¥{totalCurrentApiBudget.toLocaleString()} <span className="text-[10px] sm:text-sm font-normal text-slate-500">/年</span></p>
                        </div>
                        <div className="bg-gradient-to-br from-emerald-600 to-emerald-800 p-4 sm:p-5 rounded-xl shadow-lg border border-emerald-500 relative overflow-hidden flex flex-col justify-center">
                          <div className="absolute right-0 top-0 opacity-10"><ClockIcon className="w-24 h-24 sm:w-32 sm:h-32 -mt-4 -mr-4" /></div>
                          <p className="text-emerald-100 text-xs sm:text-sm mb-1 font-medium relative z-10">预计回本周期</p>
                          <div className="flex items-baseline relative z-10">
                            {totalCurrentApiBudget > 0 ? (
                              <><span className="text-3xl sm:text-5xl font-black text-white mr-1 sm:mr-2 drop-shadow-md">{(localDeployBudget / totalCurrentApiBudget).toFixed(1)}</span><span className="text-emerald-200 font-bold text-sm sm:text-base">年</span></>
                            ) : (
                              <span className="text-sm sm:text-base font-bold text-white leading-tight">API预算为0<br/>无法计算</span>
                            )}
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </section>

                {/* 模块四 */}
                <section className="bg-white rounded-xl sm:rounded-2xl shadow-sm p-5 sm:p-8 border border-slate-100">
                  <div className="flex items-center mb-4 sm:mb-6"><LockIcon className="w-5 h-5 sm:w-6 sm:h-6 text-emerald-600 mr-2 sm:mr-3" /><h2 className="text-xl sm:text-2xl font-bold text-slate-900">第四块：管控与隔离</h2></div>
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 sm:gap-6">
                    <div className="bg-slate-50 p-4 sm:p-5 rounded-xl border border-slate-100"><div className="bg-green-100 w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center mb-3 sm:mb-4"><MessageSquareIcon className="w-5 h-5 sm:w-6 sm:h-6 text-green-600" /></div><h3 className="text-base sm:text-lg font-bold text-slate-800 mb-1 sm:mb-2">企微/钉钉直连</h3><p className="text-xs sm:text-sm text-slate-600">无需安装新APP即可语音/文件交互。</p></div>
                    <div className="bg-slate-50 p-4 sm:p-5 rounded-xl border border-slate-100"><div className="bg-blue-100 w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center mb-3 sm:mb-4"><ServerIcon className="w-5 h-5 sm:w-6 sm:h-6 text-blue-600" /></div><h3 className="text-base sm:text-lg font-bold text-slate-800 mb-1 sm:mb-2">Docker 物理隔离</h3><p className="text-xs sm:text-sm text-slate-600">容器隔离，A团队与B团队数据绝不串号。</p></div>
                    <div className="bg-slate-50 p-4 sm:p-5 rounded-xl border border-slate-100"><div className="bg-rose-100 w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center mb-3 sm:mb-4"><AlertTriangleIcon className="w-5 h-5 sm:w-6 sm:h-6 text-rose-600" /></div><h3 className="text-base sm:text-lg font-bold text-slate-800 mb-1 sm:mb-2">高危操作阻断</h3><p className="text-xs sm:text-sm text-slate-600">发邮件、删文件必须经管理层点击“同意”。</p></div>
                  </div>
                </section>

                {/* 底部总结 */}
                <section className="bg-slate-900 rounded-xl sm:rounded-2xl shadow-xl p-5 sm:p-8 text-white relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-48 h-48 sm:w-64 sm:h-64 bg-blue-500 rounded-full blur-2xl sm:blur-3xl opacity-20 -mr-10 -mt-10 sm:-mr-20 sm:-mt-20"></div>
                  <div className="relative z-10 flex flex-col lg:flex-row items-center justify-between">
                    <div className="mb-6 lg:mb-0 lg:mr-8 w-full lg:w-auto">
                      <h2 className="text-xl sm:text-2xl font-bold mb-2 sm:mb-3">项目总预算核算</h2>
                      <p className="text-sm sm:text-base text-slate-300 leading-relaxed hidden sm:block">这笔投入将为公司团队配齐全年无休、绝对保密、算力顶配的“数字执行秘书”。</p>
                    </div>
                    <div className="bg-slate-800 p-5 sm:p-6 rounded-xl w-full lg:min-w-[320px] border border-slate-700 shadow-2xl">
                      <div className="flex justify-between items-center mb-2 sm:mb-3">
                        <span className="text-slate-400 text-xs sm:text-sm">硬件买断: <span className="text-white font-medium">{hardwareOptions[hardwareSelect].title}</span></span>
                        <span className="font-bold text-sm sm:text-base">¥{hardwareOptions[hardwareSelect].price.toLocaleString()}</span>
                      </div>
                      <div className="flex justify-between items-center mb-4 sm:mb-5 pb-4 sm:pb-5 border-b border-slate-700">
                        <span className="text-slate-400 text-xs sm:text-sm">API 预留:</span>
                        {deploymentMode === 'local' ? (
                          <div className="flex flex-col items-end">
                            <span className="text-slate-500 text-[10px] sm:text-xs line-through decoration-rose-500 decoration-2">¥{totalCurrentApiBudget.toLocaleString()}</span>
                            <span className="font-bold text-emerald-400 text-xs sm:text-sm">¥0 (本地)</span>
                          </div>
                        ) : (
                          <span className="font-bold text-sm sm:text-base">¥{effectiveApiBudget.toLocaleString()}</span>
                        )}
                      </div>
                      <div className="flex justify-between items-end sm:items-center mb-5 sm:mb-6">
                        <span className="text-base sm:text-lg font-bold text-white">首年落地总概算</span>
                        <span className="text-2xl sm:text-3xl font-black text-blue-400">¥{(hardwareOptions[hardwareSelect].price + effectiveApiBudget).toLocaleString()}</span>
                      </div>
                      <button onClick={triggerConfetti} className="w-full bg-blue-600 hover:bg-blue-500 transition-colors text-white text-sm sm:text-base font-bold py-3 sm:py-3.5 px-4 rounded-lg sm:rounded-xl shadow-lg flex items-center justify-center active:scale-95 transform sm:hover:scale-105 duration-200">
                        <CheckCircle2Icon className="w-4 h-4 sm:w-5 sm:h-5 mr-1 sm:mr-2" /> 方案确认，推进采购流程
                      </button>
                    </div>
                  </div>
                </section>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BossPresentationApp />);
    </script>
</body>
</html>
