<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博驰公司 AI 电脑采购可视化分析</title>
    <!-- 核心库：React, Tailwind CSS, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Microsoft YaHei', sans-serif; -webkit-tap-highlight-color: transparent; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 22px;
            width: 22px;
            border-radius: 50%;
            background: #2563eb;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.4);
            border: 3px solid white;
        }
        .custom-input:focus { border-bottom: 2px solid #2563eb; outline: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- 内置 SVG 图标组件 ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                'cpu': <path d="M4 4h16v16H4V4zm4 5h8v6H8V9zM2 9h2m0 6h-2m18-6h2m-2 6h2M9 2v2m6-2v2m-6 16v2m6-2v2" />,
                'zap': <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
                'hard-drive': <path d="M22 12H2M2 6h20M2 18h20M7 15h.01M17 15h.01" />,
                'settings': <path d="M12.22 2h-.44a2 2 0 0 0-2 2 2 2 0 0 1-2 2 2 2 0 0 0-2 2 2 2 0 0 1-2 2 2 2 0 0 0-2 2v.44a2 2 0 0 0 2 2 2 2 0 0 1 2 2 2 2 0 0 0 2 2 2 2 0 0 1 2 2 2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2 2 2 0 0 1 2-2 2 2 0 0 0 2-2 2 2 0 0 1 2-2 2 2 0 0 0 2-2v-.44a2 2 0 0 0-2-2 2 2 0 0 1-2-2 2 2 0 0 0-2-2 2 2 0 0 1-2-2 2 2 0 0 0-2-2zM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />,
                'cloud': <path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.1-3.9-4.4C17.6 6.5 14.1 4 10 4 6.7 4 3.9 5.8 2.5 8.5 1.1 9.4 0 10.8 0 12.5 0 14.4 1.6 16 3.5 16h1v3h13z" />,
                'shield-check': <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zm-3-9l2 2 4-4" />,
                'trending-up': <path d="M23 6l-9.5 9.5-5-5L1 18m22-12h-6m6 0v6" />,
                'check-circle': <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3" />,
                'arrow-right': <path d="M5 12h14m-7-7l7 7-7 7" />,
                'brain-circuit': <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 5.886 3 3 0 1 0 5.174 2.688 3 3 0 1 0 5.657-2.688 4 4 0 0 0 .52-5.886 4 4 0 0 0-2.526-5.77A3 3 0 0 0 12 5zm0 10V9m-3 3h6" />,
                'globe': <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></React.Fragment>,
                'lock': <React.Fragment><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4" /></React.Fragment>,
                'info': <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M12 16v-4m0-4h.01" /></React.Fragment>,
                'calculator': <path d="M16 3H8a5 5 0 0 0-5 5v8a5 5 0 0 0 5 5h8a5 5 0 0 0 5-5V8a5 5 0 0 0-5-5zM9 7h6M9 11h6M9 15h2m2 0h2" />,
                'edit': <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7m-9.5-2.5L19 3m-4 0h4v4" />,
                'calendar': <path d="M19 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zM16 2v4M8 2v4M3 10h18" />
            };
            return (
                <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const triggerConfetti = () => {
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0'; canvas.style.left = '0';
            canvas.style.width = '100%'; canvas.style.height = '100%';
            canvas.style.pointerEvents = 'none'; canvas.style.zIndex = '9999';
            document.body.appendChild(canvas);
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const particles = [];
            const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: canvas.width / 2, y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20 - 10,
                    size: Math.random() * 8 + 4, color: colors[Math.floor(Math.random() * colors.length)],
                    opacity: 1, gravity: 0.2
                });
            }
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.opacity -= 0.01;
                    if (p.opacity > 0) {
                        alive = true; ctx.globalAlpha = p.opacity; ctx.fillStyle = p.color;
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                    }
                });
                if (alive) requestAnimationFrame(animate); else document.body.removeChild(canvas);
            };
            animate();
        };

        const App = () => {
            const [selectedHardwareId, setSelectedHardwareId] = useState('m4_32gb');
            const [deploymentMode, setDeploymentMode] = useState('local');
            const [selectedRoiModel, setSelectedRoiModel] = useState('32B');
            const [comparisonMonths, setComparisonMonths] = useState(12); // 对比周期：月
            const [isEditingPrices, setIsEditingPrices] = useState(false);

            // API 每月预算
            const [apiBudgets, setApiBudgets] = useState({ 
                domestic: 600, 
                overseas: 400, 
                longContext: 200 
            });

            // 硬件价格状态（带 15% 溢价的初始值）
            const [hardwarePrices, setHardwarePrices] = useState({
                m4_base: 5174,
                m4_32gb: 8624,
                m4_pro_base: 12649,
                m4_pro_high: 17824,
                studio_max: 23574,
                studio_ultra: 46574,
                custom: 34500
            });

            const hardwareOptions = [
                { id: 'm4_base', name: 'Mac mini M4 (入门级)', specs: '16GB / 256GB', icon: 'cpu' },
                { id: 'm4_32gb', name: 'Mac mini M4 (生产力版)', specs: '32GB / 512GB', icon: 'cpu', note: '本地 AI 运行门槛' },
                { id: 'm4_pro_base', name: 'Mac mini M4 Pro (基础款)', specs: '24GB / 512GB', icon: 'zap' },
                { id: 'm4_pro_high', name: 'Mac mini M4 Pro (专业版)', specs: '64GB / 512GB', icon: 'zap', note: 'AI 推理黄金配置' },
                { id: 'studio_max', name: 'Mac Studio (Max)', specs: '64GB / 1TB', icon: 'hard-drive' },
                { id: 'studio_ultra', name: 'Mac Studio (Ultra)', specs: '128GB / 2TB', icon: 'hard-drive', note: '极致算力旗舰' },
                { id: 'custom', name: '自定义服务器设备', specs: '企业级服务器', icon: 'settings' },
            ];

            const apiModelTypes = [
                { key: 'domestic', name: '国产头部模型 (DeepSeek/Qwen)', pricePerMTokens: 2.0, desc: '办公、代码助手' },
                { key: 'overseas', name: '海外顶级模型 (Claude/GPT-4o)', pricePerMTokens: 28, desc: '逻辑推理、战略规划' },
                { key: 'longContext', name: '长文本模型 (Kimi/GLM)', pricePerMTokens: 12, desc: '文档解析、财报分析' },
            ];

            const roiModelDetails = {
                '7B': { label: '7B 规模', usage: '极速响应。适合翻译、邮件回复。', ram: '推荐 16GB - 24GB', cost: 5174 },
                '32B': { label: '32B 规模', usage: '逻辑能手。支持复杂代码、规划。', ram: '推荐 32GB - 64GB', cost: 8624 },
                '72B': { label: '72B 规模', usage: '顶级推理。支持深度研究、私有问答。', ram: '推荐 128GB+', cost: 46574 }
            };

            const currentPrice = hardwarePrices[selectedHardwareId];

            // 总月预算和年预算
            const totalApiMonthly = Object.values(apiBudgets).reduce((a, b) => a + b, 0);
            const totalApiBudgetInPeriod = totalApiMonthly * comparisonMonths;

            const paybackPeriod = totalApiMonthly === 0 ? '∞' : (currentPrice / (totalApiMonthly * 12)).toFixed(1);
            const firstYearTotal = currentPrice + (deploymentMode === 'cloud' ? totalApiMonthly * 12 : 0);

            const handlePriceChange = (id, value) => {
                setHardwarePrices(prev => ({ ...prev, [id]: Number(value) || 0 }));
            };

            const getVolume = (budget, pricePerM) => {
                const netBudget = budget / 1.15;
                const mTokens = netBudget / pricePerM;
                const words = mTokens * 70;
                return { tokens: mTokens.toFixed(2), words: words.toFixed(0) };
            };

            return (
                <div className="pb-44 min-h-screen bg-slate-50">
                    <header className="sticky top-0 z-40 p-4 bg-white/90 backdrop-blur-md border-b shadow-sm md:px-8">
                        <div className="flex flex-col justify-between gap-4 mx-auto max-w-6xl md:flex-row md:items-center">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-blue-600 rounded-xl shadow-lg">
                                    <Icon name="brain-circuit" className="w-6 h-6 text-white" />
                                </div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-900 tracking-tight">博驰公司 AI 电脑采购分析</h1>
                                    <p className="text-[10px] font-bold text-slate-500">已包含企业综合部署与支持成本</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <button 
                                    onClick={() => setIsEditingPrices(!isEditingPrices)}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold transition-all border ${isEditingPrices ? 'bg-orange-500 text-white border-orange-600 shadow-md' : 'bg-white text-slate-600 border-slate-200'}`}
                                >
                                    <Icon name="edit" className="w-4 h-4" /> {isEditingPrices ? '结束改价' : '手动调整单价'}
                                </button>
                                <div className="flex p-1 bg-slate-200 rounded-2xl border border-slate-300">
                                    <button onClick={() => setDeploymentMode('cloud')} className={`px-5 py-2 rounded-xl text-sm font-black transition-all ${deploymentMode === 'cloud' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>云端模式</button>
                                    <button onClick={() => setDeploymentMode('local')} className={`px-5 py-2 rounded-xl text-sm font-black transition-all ${deploymentMode === 'local' ? 'bg-white shadow text-green-600' : 'text-slate-500'}`}>本地模式</button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="grid grid-cols-1 gap-8 p-4 mx-auto max-w-6xl md:p-8 lg:grid-cols-12">
                        <div className="space-y-8 lg:col-span-8">
                            
                            {/* 对比周期滑块 */}
                            <section className="p-6 bg-gradient-to-r from-blue-600 to-indigo-700 rounded-3xl shadow-lg text-white">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="flex items-center gap-2 text-lg font-black"><Icon name="calendar" className="w-6 h-6" /> 成本对比观测周期</h2>
                                    <span className="bg-white/20 px-4 py-1 rounded-full font-mono text-xl font-black">{comparisonMonths} <span className="text-xs">个月</span></span>
                                </div>
                                <input 
                                    type="range" min="1" max="60" step="1" 
                                    value={comparisonMonths} 
                                    onChange={(e) => setComparisonMonths(Number(e.target.value))}
                                    className="w-full h-3 bg-white/20 rounded-full appearance-none cursor-pointer accent-white" 
                                />
                                <div className="flex justify-between text-[10px] mt-2 font-bold opacity-80 uppercase tracking-widest">
                                    <span>短期 (1个月)</span>
                                    <span>中期 (2.5年)</span>
                                    <span>长期 (5年)</span>
                                </div>
                            </section>

                            {/* 硬件选型 */}
                            <section className="p-6 bg-white border border-slate-100 rounded-3xl shadow-sm md:p-8">
                                <h2 className="flex items-center gap-2 mb-6 text-lg font-black text-slate-800"><span className="flex items-center justify-center w-6 h-6 text-[10px] text-white bg-blue-600 rounded-lg">1</span> 硬件选型与单价自定义</h2>
                                <div className="grid grid-cols-1 gap-4 sm:grid-cols-2">
                                    {hardwareOptions.map((hw) => (
                                        <div key={hw.id} onClick={() => setSelectedHardwareId(hw.id)} className={`relative cursor-pointer p-5 rounded-2xl border-2 transition-all ${selectedHardwareId === hw.id ? 'border-blue-500 bg-blue-50 shadow-md scale-[1.01]' : 'border-slate-100 bg-white hover:border-slate-200'}`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <Icon name={hw.icon} className={`${selectedHardwareId === hw.id ? 'text-blue-600' : 'text-slate-400'} w-6 h-6`} />
                                                {selectedHardwareId === hw.id && <Icon name="check-circle" className="w-5 h-5 text-blue-500" />}
                                            </div>
                                            <h3 className="font-black text-slate-800">{hw.name}</h3>
                                            <p className="mb-4 text-[10px] font-bold text-slate-500">{hw.specs}</p>
                                            <div className="flex justify-between items-end">
                                                <div className="flex items-center gap-2 text-lg font-mono font-black text-slate-900">
                                                    <span>¥</span>
                                                    {isEditingPrices ? (
                                                        <input 
                                                            type="number" 
                                                            value={hardwarePrices[hw.id]} 
                                                            onChange={(e) => handlePriceChange(hw.id, e.target.value)}
                                                            className="w-24 bg-white border-b-2 border-orange-500 custom-input px-1 text-orange-600"
                                                            onClick={(e) => e.stopPropagation()}
                                                        />
                                                    ) : (
                                                        <span>{Math.round(hardwarePrices[hw.id]).toLocaleString()}</span>
                                                    )}
                                                </div>
                                                {hw.note && <span className="px-2 py-0.5 text-[8px] font-bold text-white bg-blue-600 rounded uppercase tracking-wider">{hw.note}</span>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            {/* API 算力预算 */}
                            <section className={`bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-100 transition-all ${deploymentMode === 'local' ? 'relative' : ''}`}>
                                {deploymentMode === 'local' && (
                                    <div className="flex absolute inset-0 z-10 flex-col justify-center items-center bg-slate-900/10 rounded-3xl backdrop-blur-sm">
                                        <div className="flex flex-col gap-2 items-center px-6 py-4 bg-white border shadow-xl rounded-2xl">
                                            <Icon name="shield-check" className="w-10 h-10 text-green-500" />
                                            <p className="font-black text-slate-800">本地化已节省周期内算力开支</p>
                                        </div>
                                    </div>
                                )}
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="flex items-center gap-2 text-lg font-black text-slate-800"><span className="flex items-center justify-center w-6 h-6 text-[10px] text-white bg-blue-600 rounded-lg">2</span> API 每月算力预算</h2>
                                    <div className="text-right">
                                        <p className="text-[10px] text-slate-400 font-bold">{comparisonMonths}个月折算开支</p>
                                        <p className="text-sm font-black text-blue-600">¥{Math.round(totalApiBudgetInPeriod).toLocaleString()}</p>
                                    </div>
                                </div>
                                <div className="space-y-10">
                                    {apiModelTypes.map((model) => {
                                        const vol = getVolume(apiBudgets[model.key], model.pricePerMTokens);
                                        return (
                                            <div key={model.key} className="space-y-4">
                                                <div className="flex justify-between items-end">
                                                    <div><span className="text-sm font-black text-slate-800">{model.name}</span><p className="text-[10px] text-slate-400 font-bold">{model.desc}</p></div>
                                                    <div className="text-right"><span className="text-base font-black text-blue-600">¥{apiBudgets[model.key]}</span><span className="ml-1 text-[10px] text-slate-400">/月</span></div>
                                                </div>
                                                <input type="range" min="0" max="5000" step="100" value={apiBudgets[model.key]} onChange={(e) => setApiBudgets({...apiBudgets, [model.key]: Number(e.target.value)})} className="w-full h-2 bg-slate-100 rounded-full appearance-none cursor-pointer accent-blue-600" />
                                                <div className="grid grid-cols-2 gap-3">
                                                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 flex items-center gap-3">
                                                        <Icon name="calculator" className="w-4 h-4 text-blue-500" />
                                                        <div><p className="text-[9px] text-slate-400 font-bold">每月算力配额</p><p className="text-xs font-black text-slate-700">{vol.tokens}M Tokens</p></div>
                                                    </div>
                                                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 flex items-center gap-3">
                                                        <Icon name="globe" className="w-4 h-4 text-green-500" />
                                                        <div><p className="text-[9px] text-slate-400 font-bold">约可处理汉字</p><p className="text-xs font-black text-slate-700">{vol.words} 万字</p></div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>
                        </div>

                        {/* 右侧 ROI 汇总 */}
                        <div className="space-y-6 lg:col-span-4">
                            <div className="sticky top-28 p-6 md:p-8 text-white bg-slate-900 border border-slate-800 shadow-2xl rounded-[2.5rem]">
                                <h2 className="flex items-center gap-2 mb-6 text-lg font-black text-blue-400"><Icon name="trending-up" className="w-5 h-5" /> 投资回报 (ROI)</h2>
                                <div className="space-y-6">
                                    <div className="p-5 bg-white/5 border border-white/10 rounded-2xl">
                                        <p className="mb-1 text-[10px] font-black tracking-widest text-slate-500 uppercase">年度基准回本周期</p>
                                        <div className="flex items-baseline gap-2">
                                            <span className="font-mono text-5xl font-black text-blue-400">{paybackPeriod}</span>
                                            <span className="text-sm font-black text-slate-300">年</span>
                                        </div>
                                    </div>

                                    {/* 周期性对比逻辑 */}
                                    <div className="bg-white/5 p-5 rounded-2xl border border-dashed border-white/20">
                                        <p className="text-[10px] text-slate-500 font-bold mb-3 uppercase">在 {comparisonMonths} 个月观察期内：</p>
                                        <div className="space-y-3">
                                            <div className="flex justify-between items-center">
                                                <span className="text-xs font-bold text-slate-400">云端累计支出:</span>
                                                <span className="text-base font-mono font-bold text-blue-400">¥{Math.round(totalApiBudgetInPeriod).toLocaleString()}</span>
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <span className="text-xs font-bold text-slate-400">本地买断成本:</span>
                                                <span className="text-base font-mono font-bold text-green-400">¥{Math.round(currentPrice).toLocaleString()}</span>
                                            </div>
                                            <div className="pt-3 border-t border-white/10">
                                                {totalApiBudgetInPeriod > currentPrice ? (
                                                    <div className="text-xs text-green-400 font-black flex items-center gap-2">
                                                        <Icon name="check-circle" className="w-4 h-4" /> 本地化已实现盈利 (省 ¥{Math.round(totalApiBudgetInPeriod - currentPrice).toLocaleString()})
                                                    </div>
                                                ) : (
                                                    <div className="text-xs text-orange-400 font-bold flex items-center gap-2">
                                                        <Icon name="info" className="w-4 h-4" /> 仍需运行 {Math.ceil((currentPrice - totalApiBudgetInPeriod) / (totalApiMonthly || 1))} 个月实现回本
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        <div className="flex gap-1 p-1 bg-white/5 rounded-xl">
                                            {['7B', '32B', '72B'].map(size => (
                                                <button key={size} onClick={() => setSelectedRoiModel(size)} className={`flex-1 py-2 rounded-lg text-xs font-black transition-all ${selectedRoiModel === size ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:text-white'}`}>{size}</button>
                                            ))}
                                        </div>
                                        <div className="p-4 space-y-3 bg-white/5 border border-white/5 rounded-xl text-[10px]">
                                            <div className="flex justify-between items-center"><span className="font-black text-blue-400 text-sm">{roiModelDetails[selectedRoiModel].label}</span><span className="font-mono font-black">¥{Math.round(roiModelDetails[selectedRoiModel].cost).toLocaleString()}</span></div>
                                            <p className="text-slate-400 leading-relaxed font-medium">{roiModelDetails[selectedRoiModel].usage}</p>
                                            <div className="flex items-center gap-2 text-blue-300 font-bold"><Icon name="info" className="w-3 h-3"/> {roiModelDetails[selectedRoiModel].ram}</div>
                                            <button onClick={() => setSelectedHardwareId(selectedRoiModel === '7B' ? 'm4_base' : selectedRoiModel === '32B' ? 'm4_32gb' : 'studio_ultra')} className="w-full py-2 bg-white/10 hover:bg-white/20 rounded-lg font-black flex items-center justify-center gap-2 transition-colors">自动匹配硬件方案 <Icon name="arrow-right" className="w-3 h-3"/></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="fixed right-0 bottom-0 left-0 z-50 p-6 bg-white border-t border-slate-200 shadow-[0_-15px_40px_rgba(0,0,0,0.1)] md:px-12">
                        <div className="flex flex-col gap-6 justify-between items-center mx-auto max-w-6xl md:flex-row">
                            <div className="flex items-center gap-8">
                                <div>
                                    <p className="mb-1 text-[10px] font-black tracking-widest text-slate-400 uppercase">首年综合投入预估概算 (12个月)</p>
                                    <div className="flex items-baseline gap-1">
                                        <span className="text-3xl font-mono font-black text-slate-900 tracking-tighter">¥{Math.round(firstYearTotal).toLocaleString()}</span>
                                        <span className="text-[10px] font-black text-slate-400">RMB</span>
                                    </div>
                                </div>
                                <div className="hidden w-px h-10 bg-slate-200 md:block"></div>
                                <div className="hidden md:block">
                                    <p className="mb-1 text-[10px] font-black text-slate-400 uppercase">选定配置: <span className="text-blue-600">{deploymentMode === 'local' ? '私有化买断' : '云端订阅'}</span></p>
                                    <div className="text-sm font-black text-slate-700">{hardwareOptions.find(h => h.id === selectedHardwareId)?.name}</div>
                                </div>
                            </div>
                            <button onClick={triggerConfetti} className="flex gap-3 justify-center items-center px-10 py-4 w-full text-lg font-black text-white bg-slate-900 rounded-2xl shadow-xl transition-all transform active:scale-95 md:w-auto hover:bg-blue-600">
                                确认方案，进入流程
                                <Icon name="arrow-right" className="w-5 h-5" />
                            </button>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
